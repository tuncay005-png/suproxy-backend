environment: development

server:
  address: :8080
  read_timeout: 10
  write_timeout: 10
  shutdown_timeout: 10

database:
  host: postgres
  port: 5432
  user: suproxy
  password: suproxy
  dbname: suproxy
  sslmode: disable
  max_open_conns: 25
  max_idle_conns: 10
  conn_max_lifetime: 5
  conn_max_idle_time: 10

log:
  level: info
  format: json

jwt:
  secret_key: change-me-in-production-to-a-secure-random-string
  access_token_expiry: 15
  refresh_token_expiry: 168
  issuer: suproxy-backend

xray:
  use_mock: true
  binary_path: /usr/local/bin/xray
  config_dir: /etc/xray
  log_dir: /var/log/xray
  backup_dir: /var/backups/xray
  install_dir: /opt/xray

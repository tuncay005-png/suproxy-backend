name: Test Complete Pipeline

on:
  workflow_dispatch:

jobs:
  verify-workflows:
    name: Verify Workflow Configuration
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Verify Workflow Files Exist
        run: |
          echo "🔍 Checking workflow files..."
          
          WORKFLOWS=(
            ".github/workflows/test.yml"
            ".github/workflows/build.yml"
            ".github/workflows/deploy.yml"
            ".github/workflows/release.yml"
            ".github/workflows/security.yml"
            ".github/workflows/healthcheck.yml"
          )
          
          for workflow in "${WORKFLOWS[@]}"; do
            if [ -f "$workflow" ]; then
              echo "✅ Found: $workflow"
            else
              echo "❌ Missing: $workflow"
              exit 1
            fi
          done
      
      - name: Verify Workflow Triggers
        run: |
          echo "🔍 Verifying workflow triggers..."
          
          # test.yml should trigger on push to main
          if grep -q "branches: \[ main" .github/workflows/test.yml; then
            echo "✅ test.yml triggers on push to main"
          else
            echo "❌ test.yml doesn't trigger on push to main"
            exit 1
          fi
          
          # build.yml should wait for Tests workflow
          if grep -q 'workflows: \["Tests"\]' .github/workflows/build.yml; then
            echo "✅ build.yml waits for Tests workflow"
          else
            echo "❌ build.yml doesn't wait for Tests"
            exit 1
          fi
          
          # deploy.yml should wait for Build Docker Image workflow
          if grep -q 'workflows: \["Build Docker Image"\]' .github/workflows/deploy.yml; then
            echo "✅ deploy.yml waits for Build Docker Image workflow"
          else
            echo "❌ deploy.yml doesn't wait for Build"
            exit 1
          fi
      
      - name: Verify Permissions
        run: |
          echo "🔍 Verifying permissions..."
          
          # build.yml needs packages: write
          if grep -q "packages: write" .github/workflows/build.yml; then
            echo "✅ build.yml has packages: write permission"
          else
            echo "❌ build.yml missing packages: write"
            exit 1
          fi
          
          # release.yml needs contents: write
          if grep -q "contents: write" .github/workflows/release.yml; then
            echo "✅ release.yml has contents: write permission"
          else
            echo "❌ release.yml missing contents: write"
            exit 1
          fi
      
      - name: Pipeline Flow Summary
        run: |
          echo "## 📊 Pipeline Flow Verification" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "```" >> $GITHUB_STEP_SUMMARY
          echo "git push origin main" >> $GITHUB_STEP_SUMMARY
          echo "    ↓" >> $GITHUB_STEP_SUMMARY
          echo "test.yml (Tests)" >> $GITHUB_STEP_SUMMARY
          echo "    ↓ (workflow_run)" >> $GITHUB_STEP_SUMMARY
          echo "build.yml (Build Docker Image)" >> $GITHUB_STEP_SUMMARY
          echo "    ↓ (workflow_run)" >> $GITHUB_STEP_SUMMARY
          echo "deploy.yml (Deploy to Production)" >> $GITHUB_STEP_SUMMARY
          echo "    ↓" >> $GITHUB_STEP_SUMMARY
          echo "Health Checks" >> $GITHUB_STEP_SUMMARY
          echo "```" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ All workflow files verified" >> $GITHUB_STEP_SUMMARY

  verify-scripts:
    name: Verify Deployment Scripts
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Verify deploy.sh
        run: |
          echo "🔍 Verifying deploy.sh..."
          
          if [ ! -f "scripts/deploy.sh" ]; then
            echo "❌ deploy.sh not found"
            exit 1
          fi
          
          # Should use docker pull, not docker build
          if grep -q "docker pull" scripts/deploy.sh; then
            echo "✅ deploy.sh uses docker pull"
          else
            echo "❌ deploy.sh doesn't use docker pull"
            exit 1
          fi
          
          # Should NOT use docker build
          if grep -q "docker build" scripts/deploy.sh; then
            echo "❌ deploy.sh still uses docker build"
            exit 1
          fi
          
          # Check for GHCR reference
          if grep -q "ghcr.io" scripts/deploy.sh; then
            echo "✅ deploy.sh references GHCR"
          else
            echo "⚠️  deploy.sh might not reference GHCR correctly"
          fi
      
      - name: Verify docker-compose.production.yml
        run: |
          echo "🔍 Verifying docker-compose.production.yml..."
          
          if [ ! -f "docker-compose.production.yml" ]; then
            echo "❌ docker-compose.production.yml not found"
            exit 1
          fi
          
          # Should use ghcr.io image
          if grep -q "ghcr.io" docker-compose.production.yml; then
            echo "✅ docker-compose uses GHCR image"
          else
            echo "⚠️  docker-compose might not reference GHCR"
          fi

  verify-documentation:
    name: Verify Documentation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Verify Documentation Files
        run: |
          echo "🔍 Checking documentation files..."
          
          DOCS=(
            "docs/CI_CD_ARCHITECTURE.md"
            "docs/DEPLOYMENT.md"
            "docs/ROLLBACK.md"
            "docs/MULTISERVER.md"
            "docs/BACKUP.md"
            "docs/SERVER_SETUP.md"
            "IMPLEMENTATION_SUMMARY.md"
            "DEPLOYMENT_CHECKLIST.md"
            "README.md"
          )
          
          for doc in "${DOCS[@]}"; do
            if [ -f "$doc" ]; then
              echo "✅ Found: $doc"
            else
              echo "⚠️  Missing: $doc"
            fi
          done

  summary:
    name: Pipeline Test Summary
    runs-on: ubuntu-latest
    needs: [verify-workflows, verify-scripts, verify-documentation]
    if: always()
    
    steps:
      - name: Generate Summary
        run: |
          echo "# 🎉 Pipeline Verification Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.verify-workflows.result }}" = "success" ] && \
             [ "${{ needs.verify-scripts.result }}" = "success" ] && \
             [ "${{ needs.verify-documentation.result }}" = "success" ]; then
            echo "## ✅ All Checks Passed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Your pipeline is ready for production!" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Next Steps:" >> $GITHUB_STEP_SUMMARY
            echo "1. Verify GitHub Secrets are configured" >> $GITHUB_STEP_SUMMARY
            echo "2. Make a test commit to main branch" >> $GITHUB_STEP_SUMMARY
            echo "3. Watch the automatic pipeline execution" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Some Checks Failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Review the logs above for details" >> $GITHUB_STEP_SUMMARY
          fi

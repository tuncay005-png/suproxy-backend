# ⚠️ DEPRECATED WORKFLOW - KEPT AS BACKUP ONLY
# This workflow is NOT active and will NOT run
# The new modular pipeline is:
#   test.yml → build.yml → deploy.yml
# 
# This file is preserved for rollback purposes only

name: Emergency Deploy (Deprecated)

on:
  # DISABLED - Will not trigger automatically
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "EMERGENCY_ROLLBACK" to use this deprecated workflow'
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  verify-emergency:
    name: Verify Emergency Rollback
    runs-on: ubuntu-latest
    steps:
      - name: Verify Confirmation
        run: |
          if [ "${{ inputs.confirm }}" != "EMERGENCY_ROLLBACK" ]; then
            echo "❌ This workflow is deprecated and should not be used"
            echo "❌ Please use the new modular pipeline: test.yml → build.yml → deploy.yml"
            echo "❌ Or use rollback.yml for controlled rollbacks"
            exit 1
          fi
          echo "⚠️  Emergency rollback confirmed - proceeding with deprecated workflow"

  deploy:
    runs-on: ubuntu-latest
    needs: verify-emergency

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate Version
        id: version
        run: |
          VERSION=v1.0.${{ github.run_number }}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build \
            -t ghcr.io/${{ github.repository_owner }}/suproxy-backend:latest \
            -t ghcr.io/${{ github.repository_owner }}/suproxy-backend:${{ env.VERSION }} \
            .

      - name: Push Docker Image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/suproxy-backend:latest
          docker push ghcr.io/${{ github.repository_owner }}/suproxy-backend:${{ env.VERSION }}

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd /opt/suproxy
            /opt/suproxy/scripts/deploy.sh
name: Create Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        default: false
        type: boolean
      draft:
        description: 'Create as draft'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  packages: read

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.validate.outputs.version }}
      tag: ${{ steps.validate.outputs.tag }}
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for changelog

      - name: Validate Version
        id: validate
        run: |
          VERSION="${{ inputs.version }}"
          
          # Ensure version starts with 'v'
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+.*$ ]]; then
            echo "❌ Invalid version format: $VERSION"
            echo "Expected format: v1.0.0 or v1.0.0-rc.1"
            exit 1
          fi
          
          # Check if tag already exists
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "❌ Tag $VERSION already exists"
            exit 1
          fi
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$VERSION" >> $GITHUB_OUTPUT
          echo "✅ Version validated: $VERSION"

      - name: Verify Docker Image Exists
        run: |
          VERSION="${{ steps.validate.outputs.version }}"
          
          # Check if the Docker image exists in GHCR
          echo "Checking for image: ghcr.io/${{ github.repository_owner }}/suproxy-backend:$VERSION"
          
          # Try to pull the image metadata
          docker manifest inspect ghcr.io/${{ github.repository_owner }}/suproxy-backend:$VERSION >/dev/null 2>&1 || {
            echo "⚠️  Docker image not found for version $VERSION"
            echo "This is acceptable for manual releases, but ensure the image will be built"
          }

  changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    needs: validate
    outputs:
      changelog: ${{ steps.changelog.outputs.changelog }}
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Changelog
        id: changelog
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          
          # Get the previous tag
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          if [ -z "$PREVIOUS_TAG" ]; then
            echo "📝 First release - including all commits"
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges)
          else
            echo "📝 Generating changelog since $PREVIOUS_TAG"
            COMMITS=$(git log $PREVIOUS_TAG..HEAD --pretty=format:"- %s (%h)" --no-merges)
          fi
          
          # Create changelog using heredoc
          cat > CHANGELOG.tmp <<EOF
          ## What's Changed
          
          $COMMITS
          
          **Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREVIOUS_TAG}...${VERSION}
          EOF
          
          # Output for next job (escape newlines)
          echo "changelog<<CHANGELOG_EOF" >> $GITHUB_OUTPUT
          cat CHANGELOG.tmp >> $GITHUB_OUTPUT
          echo "CHANGELOG_EOF" >> $GITHUB_OUTPUT
          
          echo "✅ Changelog generated"

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [validate, changelog]
    outputs:
      release_id: ${{ steps.create_release.outputs.release_id }}
      release_url: ${{ steps.create_release.outputs.release_url }}
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create Git Tag
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"
          
          echo "✅ Tag created: $VERSION"

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.validate.outputs.version }}
          name: Release ${{ needs.validate.outputs.version }}
          body: |
            ## 🚀 Release ${{ needs.validate.outputs.version }}
            
            ### Docker Images
            ```bash
            docker pull ghcr.io/${{ github.repository_owner }}/suproxy-backend:${{ needs.validate.outputs.version }}
            docker pull ghcr.io/${{ github.repository_owner }}/suproxy-backend:latest
            ```
            
            ### Commit Information
            - **Commit SHA:** `${{ github.sha }}`
            - **Commit Short:** `${{ github.sha }}` (first 7 chars)
            
            ### Deployment
            This release will be automatically deployed to production.
            
            ---
            
            ${{ needs.changelog.outputs.changelog }}
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release Summary
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          
          echo "## 🎉 Release Created Successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** $VERSION" >> $GITHUB_STEP_SUMMARY
          echo "**Type:** ${{ inputs.prerelease && 'Pre-release' || 'Stable' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Draft:** ${{ inputs.draft }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Release URL:** https://github.com/${{ github.repository }}/releases/tag/$VERSION" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Docker Images:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ghcr.io/${{ github.repository_owner }}/suproxy-backend:$VERSION" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  trigger-deployment:
    name: Trigger Deployment
    runs-on: ubuntu-latest
    needs: [validate, release]
    if: ${{ !inputs.draft && !inputs.prerelease }}
    
    steps:
      - name: Trigger Deploy Workflow
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ needs.validate.outputs.version }}';
            
            console.log(`Triggering deployment for version ${version}`);
            
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: 'main',
              inputs: {
                version: version,
                servers: 'all'
              }
            });
            
            console.log('✅ Deployment triggered');

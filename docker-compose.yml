version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: suproxy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-suproxy}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-suproxy}
      POSTGRES_DB: ${DB_NAME:-suproxy}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-suproxy}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - suproxy-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: suproxy-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SUPROXY_ENVIRONMENT: ${ENVIRONMENT:-development}
      SUPROXY_SERVER_ADDRESS: :8080
      SUPROXY_DATABASE_HOST: postgres
      SUPROXY_DATABASE_PORT: 5432
      SUPROXY_DATABASE_USER: ${DB_USER:-suproxy}
      SUPROXY_DATABASE_PASSWORD: ${DB_PASSWORD:-suproxy}
      SUPROXY_DATABASE_DBNAME: ${DB_NAME:-suproxy}
      SUPROXY_DATABASE_SSLMODE: disable
      SUPROXY_LOG_LEVEL: ${LOG_LEVEL:-info}
      SUPROXY_LOG_FORMAT: json
      SUPROXY_JWT_SECRET_KEY: ${JWT_SECRET:-change-me-in-production}
      SUPROXY_JWT_ACCESS_TOKEN_EXPIRY: ${JWT_ACCESS_EXPIRY:-15}
      SUPROXY_JWT_REFRESH_TOKEN_EXPIRY: ${JWT_REFRESH_EXPIRY:-168}
      SUPROXY_XRAY_USE_MOCK: ${XRAY_USE_MOCK:-true}
      SUPROXY_XRAY_BINARY_PATH: /usr/local/bin/xray
      SUPROXY_XRAY_CONFIG_DIR: /etc/xray
      SUPROXY_XRAY_LOG_DIR: /var/log/xray
      SUPROXY_XRAY_BACKUP_DIR: /var/backups/xray
      SUPROXY_METRICS_ENABLED: ${METRICS_ENABLED:-true}
      SUPROXY_METRICS_COLLECTION_INTERVAL: ${METRICS_INTERVAL:-30}
    ports:
      - "${API_PORT:-8080}:8080"
    volumes:
      - xray_config:/etc/xray
      - xray_logs:/var/log/xray
      - xray_backups:/var/backups/xray
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - suproxy-network

volumes:
  postgres_data:
    driver: local
  xray_config:
    driver: local
  xray_logs:
    driver: local
  xray_backups:
    driver: local

networks:
  suproxy-network:
    driver: bridge
